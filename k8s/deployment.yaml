apiVersion: apps/v1
kind: Deployment
metadata:
  name: queryguard
  namespace: queryguard
  labels:
    app: queryguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queryguard
  template:
    metadata:
      labels:
        app: queryguard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: queryguard
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: queryguard
          # Replace with your image registry and pinned tag
          image: YOUR_REGISTRY/queryguard:0.0.1
          imagePullPolicy: Always

          ports:
            - name: proxy
              containerPort: 5433
            - name: dashboard
              containerPort: 8080
            - name: metrics
              containerPort: 9090

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          env:
            - name: QG_DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: queryguard-secret
                  key: dashboard-username
            - name: QG_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: queryguard-secret
                  key: dashboard-password
            - name: QG_METRICS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: queryguard-secret
                  key: metrics-username
            - name: QG_METRICS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: queryguard-secret
                  key: metrics-password

          volumeMounts:
            - name: config
              mountPath: /etc/queryguard
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp

          # Liveness: /health and /ready are always unauthenticated
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 3
            periodSeconds: 5

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

      volumes:
        - name: config
          configMap:
            name: queryguard-config
        - name: tmp-volume
          emptyDir: {}
