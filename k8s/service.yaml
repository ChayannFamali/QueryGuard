# Proxy: доступен внутри кластера как queryguard-proxy:5433
apiVersion: v1
kind: Service
metadata:
  name: queryguard-proxy
  namespace: queryguard
spec:
  selector:
    app: queryguard
  ports:
    - name: proxy
      port: 5433
      targetPort: 5433
---
# Dashboard: для внешнего доступа
apiVersion: v1
kind: Service
metadata:
  name: queryguard-dashboard
  namespace: queryguard
spec:
  type: NodePort
  selector:
    app: queryguard
  ports:
    - name: dashboard
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: metrics
      port: 9090
      targetPort: 9090
      nodePort: 30090
