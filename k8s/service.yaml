# Dashboard and Metrics: ClusterIP only.
# Expose externally via an Ingress with TLS termination.
---
apiVersion: v1
kind: Service
metadata:
  name: queryguard-proxy
  namespace: queryguard
spec:
  selector:
    app: queryguard
  ports:
    - name: proxy
      port: 5433
      targetPort: 5433
---
apiVersion: v1
kind: Service
metadata:
  name: queryguard-dashboard
  namespace: queryguard
spec:
  # Changed from NodePort to ClusterIP — use Ingress for external access
  type: ClusterIP
  selector:
    app: queryguard
  ports:
    - name: dashboard
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
