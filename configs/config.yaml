proxy:
  listen_addr: "0.0.0.0:5433"
  target_addr: "localhost:5432"

postgres:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  database: "postgres"

log:
  level: "debug"      # debug | info | warn | error
  format: "console"  # console | json

dashboard:
  enabled: true
  listen_addr: "0.0.0.0:8080"
  username: "admin"
  password: "admin"

policy:
  dry_run: false       # на старте всегда true — только логируем, не блокируем
  config_path: "configs/policies.yaml"

metrics:
  enabled: true
  listen_addr: "0.0.0.0:9090"
